spring.application.name=xllent_e-commerce


# ===============================
# Server
# ===============================
server.port=8082

# ===============================
# PostgreSQL Database
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/xllent_ecommerce_db
spring.datasource.username=postgres
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# Multipart File Upload
# ===============================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

# ===============================
# Static Resource (if storing images locally)
# ===============================
spring.web.resources.static-locations=file:uploads/

# ===============================
# Logging
# ===============================
logging.level.org.springframework.security=DEBUG

# ===============================
# JWT Configuration
# ===============================
jwt.secret=MyVerySecretKeyForJWTAuthentication123456789MyVerySecretKey
jwt.expiration=86400000

